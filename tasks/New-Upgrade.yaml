---
# New upgrade tasks file for ansible-role-elevate

- name: "Remove unneeded packages"
  dnf:
    name:
      - "leapp*"
      - elevate-release
      - epel-release
      - rpmconf
      - yum-utils
      - iptables-ebtables
      - make-devel
    state: absent

- name: "Set fact to indicate Rocky Linux upgrade"
  set_fact:
    repo_url: "https://download.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/Packages/r"
    rocky_release_pkg: "rocky-release-9.7-1.3.el9.noarch.rpm"
    rocky_repos_pkg: "rocky-repos-9.7-1.3.el9.noarch.rpm"
    rocky_gpg_pkg: "rocky-gpg-keys-9.7-1.3.el9.noarch.rpm"

- name: "Install Rocky Linux 9.7 release, repos, and GPG keys"
  dnf:
    name:
      - "{{ repo_url }}/{{ rocky_release_pkg }}"
      - "{{ repo_url }}/{{ rocky_repos_pkg }}"
      - "{{ repo_url }}/{{ rocky_gpg_pkg }}"
    state: present
    disable_gpg_check: true

- name: "Remove Red Hat logos if present"
  file:
    path: /usr/share/redhat-logos
    state: absent

- name: "Stop auditd service"
  shell: service auditd stop
  args:
    warn: false

- name: "Distro-sync to Rocky Linux 9"
  command: >
    dnf -y --releasever=9
    --allowerasing
    --setopt=deltarpm=false
    distro-sync
  register: distro_sync
  changed_when: true

- name: "Rebuild RPM database"
  command: rpm --rebuilddb
  changed_when: true

- name: "Reboot system after distro-sync"
  reboot:
    reboot_timeout: 14400

- name: "Install firewalld package"
  dnf:
    name: firewalld
    state: present

- name: "Enable and start firewalld"
  service:
    name: firewalld
    state: started
    enabled: true

- name: "Remove EL8 kernels"
  dnf:
    name: "kernel*el8*"
    state: absent

- name: "Set fact for GPG keys to remove"
  set_fact:
    gpg_keys_to_remove:
      - gpg-pubkey-f4a80eb5-53a7ff4b
      - gpg-pubkey-352c64e5-52ae6884
      - gpg-pubkey-2f86d6a1-5cf7cefb
      - gpg-pubkey-81b961a5-64106f70
      - gpg-pubkey-621e9f35-58adea78
      - gpg-pubkey-fd431d51-4ae0493b
      - gpg-pubkey-d4082792-5b32db75

- name: "Remove unwanted GPG public keys and reset DNF modules"
  command: rpm -e --allmatches {{ item }}
  loop: "{{ gpg_keys_to_remove }}"
  ignore_errors: true
  changed_when: true

- name: "Reset all DNF modules"
  command: dnf -y module reset '*'
  changed_when: true

- name: "Clean DNF cache"
  command: dnf clean all
  changed_when: true
